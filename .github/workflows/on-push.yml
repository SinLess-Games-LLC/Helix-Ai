name: Open Pull Request on Git-Flow Branch

on:
  push:
    branches:
      - 'feature/*'
      - 'bugfix/*'
      - 'hotfix/*'
      - 'release/*'
      - 'support/*'
      - 'develop'
      - 'master'

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Run Prettier
        id: prettier-run
        uses: rutajdash/prettier-cli-action@v1.0.2
        with:
          config_path: ./.prettierrc.yml
          file_pattern: '**/*.{js,jsx,ts,tsx,css,scss,html,json,md,yml,yaml}'

      # This step only runs if prettier finds errors causing the previous step to fail
      # This steps lists the files where errors were found
      - name: Prettier Output
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "The following files are not formatted:"
          echo "${{steps.prettier-run.outputs.prettier_output}}"

  eslint_check:
    name: Prepare action
    runs-on: ubuntu-latest
    steps:
      # Checkout action must run prior to eslint check
    - name: Checkout
      uses: actions/checkout@v1
    - name: Lint
      uses: Krizzu/eslint-check-action@v1.1.0
      with:
        ghToken: ${{ secrets.GITHUB_TOKEN }}
        eslintConfig: ".eslintrc.json"
        eslintExt: js, ts, jsx, tsx

  todos:
    name: Run TODO Generator
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: Run tdg-github-action
      uses: ribtoks/tdg-github-action@master
      with:
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        REF: ${{ github.ref }}

  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Extract branch name
        run: |
          branch_name=${GITHUB_REF#refs/heads/}
          echo "Branch Name: $branch_name"

      - name: Debugging
        run: |
          echo "Current directory: $(pwd)"
          echo "List files in the current directory: $(ls -a)"

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install gh

      - name: Check if PR exists
        id: check_pr
        run: |
          existing_prs=$(gh pr list --base develop --head "${branch_name}" --state open --json number)
          if [ -n "$existing_prs" ]; then
            echo "PR already exists for branch $branch_name. Skipping PR creation."
            exit 0
          fi
      - name: Create Pull Request
        if: steps.check_pr.outcome != 'success'
        run: |
          gh pr create --base develop --head "${branch_name}" --title "${branch_name}" --body "This PR was automatically created by a GitHub Action. Please review and merge if approved."
