version: '1.2'
namespace: Development

segments:
  - key: helix-ai-users
    name: Helix AI Users
    match_type: ALL_MATCH_TYPE

  - key: helix-ai-admins
    name: Helix AI Admins
    match_type: ALL_MATCH_TYPE
    constraints:
      - property: email
        operator: CONTAINS
        value: '@helixai.com'
        type: STRING_COMPARISON_TYPE
      - property: organization
        operator: eq
        value: 'Helix AI'
        type: STRING_COMPARISON_TYPE
      - property: role
        operator: eq
        value: 'Admin'
        type: STRING_COMPARISON_TYPE

  - key: helix-ai-owners
    name: Helix AI Owners
    match_type: ALL_MATCH_TYPE
    constraints:
      - property: organization
        operator: eq
        value: 'Helix AI'
        type: STRING_COMPARISON_TYPE
      - property: role
        operator: eq
        value: 'Owner'
        type: STRING_COMPARISON_TYPE

  - key: helix-ai-developers
    name: Helix AI Developers
    match_type: ALL_MATCH_TYPE
    constraints:
      - property: organization
        operator: eq
        value: 'Helix AI'
        type: STRING_COMPARISON_TYPE
      - property: role
        operator: eq
        value: 'Developer'
        type: STRING_COMPARISON_TYPE

  - key: helix-ai-system-admins
    name: Helix AI System Admins
    match_type: ALL_MATCH_TYPE
    constraints:
      - property: organization
        operator: eq
        value: 'Helix AI'
        type: STRING_COMPARISON_TYPE
      - property: role
        operator: eq
        value: 'System Admin'
        type: STRING_COMPARISON_TYPE
