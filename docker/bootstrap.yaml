version: '3.5'

networks:
  helix:
    external: true

services:
  bootstrap: &bootstrap
    build:
      context: .
      dockerfile: ./setup/Dockerfile
    container_name: bootstrap
    hostname: bootstrap
    networks:
      - helix
    volumes:
      - ./setup/config.yaml:/home/docker/config/config.yaml
      - ./certs:/certs/
      - ./setup/scripts/security/certs.sh:/home/docker/config/certs.sh
    command: /bin/bash -c "chmod +x /home/docker/config/certs.sh && /home/docker/config/certs.sh"

  flipt: &flipt
    image: docker.flipt.io/flipt/flipt:latest
    ports:
      - '8080:8080'
      - '9000:9000'
    volumes:
      - './.data/flipt:/var/opt/flipt'
